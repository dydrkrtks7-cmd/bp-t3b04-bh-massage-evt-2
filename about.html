    <style>
        :root {
            --neon-pink: #ff2d78;
            --neon-blue: #0af0ff;
            --neon-purple: #b300ff;
            --neon-green: #39ff14;
            --void-black: #0a0a0a;
            --concrete-gray: #2a2a2a;
            --steel-gray: #3d3d3d;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --border-brutal: 3px solid var(--neon-pink);
            --shadow-brutal: 6px 6px 0px rgba(255,45,120,0.3);
            --brutal-spacing: 8px;
            --brutal-padding: 16px;
            --font-mono: 'Courier New', Courier, monospace;
            --font-sans: 'Inter', 'Helvetica Neue', Arial, sans-serif;
            --grid-gap: 24px;
            --card-radius: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--void-black);
            color: var(--text-primary);
            font-family: var(--font-sans);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ---------- BRUTALIST GRID ---------- */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--brutal-padding);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: var(--grid-gap);
        }

        .col-span-12 { grid-column: span 12; }
        .col-span-6 { grid-column: span 6; }
        .col-span-4 { grid-column: span 4; }
        .col-span-3 { grid-column: span 3; }

        /* ---------- TYPOGRAPHY ---------- */
        h1, h2, h3, h4 {
            font-family: var(--font-mono);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            border-left: var(--border-brutal);
            padding-left: 16px;
            margin-bottom: 24px;
            text-shadow: 4px 4px 0 rgba(255,45,120,0.3);
        }

        h2 {
            font-size: clamp(1.5rem, 3vw, 2.2rem);
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 8px;
            margin: 40px 0 24px 0;
            color: var(--neon-blue);
        }

        h3 {
            font-size: clamp(1.1rem, 2vw, 1.5rem);
            color: var(--neon-pink);
            margin-bottom: 12px;
        }

        h4 {
            font-size: 1rem;
            color: var(--neon-green);
            margin-bottom: 8px;
        }

        p {
            margin-bottom: 16px;
            font-size: 1rem;
        }

        a {
            color: var(--neon-blue);
            text-decoration: none;
            border-bottom: 1px dashed var(--neon-blue);
            transition: all 0.2s;
        }

        a:hover {
            color: var(--neon-pink);
            border-bottom-style: solid;
        }

        strong {
            color: var(--neon-green);
            font-weight: 700;
        }

        .highlight {
            background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* ---------- COMPONENTS ---------- */
        .card {
            background: var(--concrete-gray);
            border: 2px solid var(--steel-gray);
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s;
            position: relative;
        }

        .card:hover {
            border-color: var(--neon-pink);
            box-shadow: var(--shadow-brutal);
            transform: translate(-3px, -3px);
        }

        .card--accent {
            border-left: var(--border-brutal);
            background: linear-gradient(135deg, var(--concrete-gray) 0%, #1a1a2e 100%);
        }

        .card--data {
            border: 2px solid var(--neon-blue);
            background: rgba(10, 240, 255, 0.05);
        }

        .btn {
            display: inline-block;
            background: transparent;
            color: var(--neon-pink);
            border: 2px solid var(--neon-pink);
            padding: 12px 32px;
            font-family: var(--font-mono);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--neon-pink);
            color: var(--void-black);
            box-shadow: var(--shadow-brutal);
        }

        .badge {
            display: inline-block;
            background: var(--neon-purple);
            color: white;
            padding: 4px 12px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .data-value {
            font-family: var(--font-mono);
            font-size: 2rem;
            font-weight: 700;
            color: var(--neon-green);
            line-height: 1;
        }

        .data-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
        }

        hr {
            border: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue), var(--neon-purple));
            margin: 40px 0;
        }

        /* ---------- HEADER / NAV ---------- */
        .site-header {
            border-bottom: var(--border-brutal);
            padding: 20px 0;
            margin-bottom: 40px;
            background: rgba(10, 10, 10, 0.95);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .nav__brand {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--neon-pink);
            text-decoration: none;
            border: none;
        }

        .nav__brand:hover {
            color: var(--neon-blue);
            border: none;
        }

        .nav__list {
            display: flex;
            gap: 24px;
            list-style: none;
        }

        .nav__list a {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: none;
            padding: 4px 0;
            position: relative;
        }

        .nav__list a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--neon-pink);
            transition: width 0.3s;
        }

        .nav__list a:hover::after {
            width: 100%;
        }

        .nav__list a.active {
            color: var(--neon-pink);
        }

        .nav__list a.active::after {
            width: 100%;
            background: var(--neon-pink);
        }

        /* ---------- HAMBURGER ---------- */
        .hamburger-menu {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
            background: none;
            border: none;
            padding: 8px;
        }

        .hamburger-menu span {
            display: block;
            width: 28px;
            height: 3px;
            background: var(--neon-pink);
            transition: all 0.3s;
        }

        /* ---------- FOOTER ---------- */
        .site-footer {
            border-top: 2px solid var(--steel-gray);
            padding: 40px 0;
            margin-top: 60px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* ---------- TABLE ---------- */
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: var(--font-mono);
            margin: 24px 0;
        }

        th, td {
            border: 1px solid var(--steel-gray);
            padding: 12px 16px;
            text-align: left;
        }

        th {
            background: var(--concrete-gray);
            color: var(--neon-blue);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        td {
            background: rgba(42, 42, 42, 0.5);
        }

        tr:hover td {
            background: rgba(255, 45, 120, 0.1);
        }

        /* ---------- RESPONSIVE 768 ---------- */
        @media (max-width: 768px) {
            .hamburger-menu {
                display: flex;
            }

            .nav__list {
                display: none;
                flex-direction: column;
                width: 100%;
                padding: 20px 0;
                gap: 12px;
                border-top: 2px solid var(--steel-gray);
                margin-top: 16px;
            }

            .nav__list.open {
                display: flex;
            }

            .grid {
                grid-template-columns: repeat(4, 1fr);
            }

            .col-span-12 { grid-column: span 4; }
            .col-span-6 { grid-column: span 4; }
            .col-span-4 { grid-column: span 4; }
            .col-span-3 { grid-column: span 4; }

            h1 {
                font-size: 1.8rem;
            }
        }

        /* ---------- FAQ ACCORDION ---------- */
        .faq-item {
            border: 1px solid var(--steel-gray);
            margin-bottom: 8px;
        }

        .faq-question {
            background: var(--concrete-gray);
            padding: 16px 20px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-size: 0.95rem;
            color: var(--neon-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            user-select: none;
        }

        .faq-question::after {
            content: '+';
            font-size: 1.5rem;
            color: var(--neon-pink);
            transition: transform 0.3s;
        }

        .faq-item.active .faq-question::after {
            content: '−';
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            padding: 0 20px;
            background: rgba(42, 42, 42, 0.3);
        }

        .faq-item.active .faq-answer {
            max-height: 300px;
            padding: 16px 20px;
        }

        /* ---------- MISC ---------- */
        .tag {
            display: inline-block;
            background: rgba(179, 0, 255, 0.2);
            border: 1px solid var(--neon-purple);
            padding: 2px 10px;
            font-size: 0.75rem;
            font-family: var(--font-mono);
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .stat-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin: 24px 0;
        }

        .stat-box {
            flex: 1;
            min-width: 150px;
            border: 1px solid var(--neon-green);
            padding: 16px;
            text-align: center;
            background: rgba(57, 255, 20, 0.05);
        }

        img.placeholder {
            width: 100%;
            height: auto;
            background: var(--concrete-gray);
            border: 2px solid var(--steel-gray);
        }
    </style>
</head>

</body>
</html>
